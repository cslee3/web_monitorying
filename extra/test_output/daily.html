<!DOCTYPE html>
                    <html>
                    <head>
                      <meta charset="utf-8">
                      <title>Daily</title>
                      
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --pos: #3fb950;
    --neg: #f85149;
    --accent: #58a6ff;
    --header-bg: #1f2937;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Consolas', monospace; background: var(--bg); color: var(--text); font-size: 12px; padding: 12px; }
  h1 { font-size: 16px; color: var(--accent); margin-bottom: 12px; }
  h2 { font-size: 13px; color: var(--accent); margin: 16px 0 6px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  h3 { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
  .tab { padding: 4px 12px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; color: var(--muted); background: var(--surface); }
  .tab.active { border-color: var(--accent); color: var(--accent); }
  .panel { display: none; }
  .panel.active { display: block; }
  .table-box { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px; margin-bottom: 12px; }
  .scroll-x { overflow-x: auto; }
  table { border-collapse: collapse; white-space: nowrap; }
  th { background: var(--header-bg); color: var(--muted); padding: 4px 8px; text-align: right; border-bottom: 1px solid var(--border); position: sticky; top: 0; }
  th:first-child { text-align: left; }
  td { padding: 3px 8px; text-align: right; border-bottom: 1px solid var(--border); }
  td:first-child { text-align: left; }
  tr:hover td { background: #1f2937; }
  .pos { color: var(--pos); }
  .neg { color: var(--neg); }
  .empty { color: var(--muted); font-style: italic; padding: 8px; }
  #last-updated { font-size: 10px; color: var(--muted); margin-bottom: 8px; }
</style>

                    </head>
                    <body>
                      <h1>Daily</h1>
                      
    <div class="table-box">
        <h3>Daily</h3>
        <div class="scroll-x">
        <table>
            <thead><tr><th>분류</th><th>MTM</th><th>THEO</th><th>누적괴리</th></tr></thead>
            <tbody><tr><td class="">주식선물</td><td class="">0.0</td><td class="">0.0</td><td class="">0.0</td></tr><tr><td class="">과세차익</td><td class="">0.0</td><td class="">0.0</td><td class="">0.0</td></tr><tr><td class="">지수선물</td><td class="">0.0</td><td class="">0.0</td><td class="">0.0</td></tr><tr><td class="">지수옵션</td><td class="">0.0</td><td class="">0.0</td><td class="">0.0</td></tr><tr><td class="">섹터선물</td><td class="">0.0</td><td class="">0.0</td><td class="">0.0</td></tr><tr><td class="">ELW차익</td><td class="">0.0</td><td class="">0.0</td><td class="">0.0</td></tr></tbody>
        </table>
        </div>
    </div>
    
                    </body>
                    </html>
