<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>Welcome</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw; height: 100vh;
    background: #fff;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden;
    gap: 20px;
  }
  #logo {
    width: 180px;
    object-fit: contain;
  }
  #photo {
    max-width: 100%;
    max-height: calc(100vh - 140px);
    object-fit: contain;
  }
</style>
</head>
<body>
  <img id="logo"  src="../static/logo.png" alt="Logo"/>
  <img id="photo" src="../static/elon.jpg" alt="Elon Musk"/>
</body>
</html>
