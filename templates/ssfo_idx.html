<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>SSF MM2</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; font-size: 12px; background: #fff; }

  .info-bar {
    display: flex; align-items: center; gap: 20px;
    padding: 5px 10px; background: #eef2f6; border-bottom: 1px solid #d0d8e0;
    position: sticky; top: 0; z-index: 10; flex-wrap: wrap;
  }
  .info-bar .item { font-size: 11px; }
  .info-bar .item span { font-weight: bold; }
  .updated { margin-left: auto; color: #888; font-size: 11px; }

  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #ccc; display: inline-block; margin-right: 6px;
    transition: background 0.2s;
  }
  .dot.live { background: #2ecc71; }
  .dot.error { background: #e74c3c; }

  .tables-wrap {
    overflow: auto;
    height: calc(100vh - 30px);
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .table-section { display: inline-block; }

  table { border-collapse: collapse; white-space: nowrap; }
  thead th {
    background: #202123; color: #fff; padding: 4px 7px;
    font-size: 11px; text-align: center; border: 1px solid #444;
  }
  td { padding: 2px 6px; border: 1px solid #e0e0e0; }
  tr:hover td { background: #fffde7 !important; }
  .total-row td { background: #e2efda !important; font-weight: bold; }

  @keyframes flash {
    0%   { background-color: #fff176; }
    100% { background-color: transparent; }
  }
  .flash { animation: flash 0.8s ease-out; }

  .pnl-green { color: #1a7c34; }
  .pnl-red   { color: #cc0000; }

  #status { padding: 40px; text-align: center; color: #888; font-size: 14px; }
</style>
</head>
<body>

<div class="info-bar" id="infoBar" style="display:none">
  <span class="dot" id="liveDot"></span>
  <div class="item">BaseDate: <span id="hBaseDate"></span></div>
  <div class="item">Ytd: <span id="hYtd"></span></div>
  <div class="item">I/R: <span id="hIr"></span></div>
  <div class="item">Expiry1: <span id="hExp1"></span></div>
  <div class="item">Expiry2: <span id="hExp2"></span></div>
  <div class="updated">Updated: <span id="hUpdated">-</span></div>
</div>

<div id="status">데이터 로딩 중...</div>

<div class="tables-wrap" id="tablesWrap" style="display:none"></div>

<script>
// 새 섹션을 시작하는 IdxCode 마커 (cidx 0 값 기준)
const SECTION_STARTERS = new Set(["Q150 Roll", "K2G01P", "091160", "Udly", "IndexCode"]);

let colOrder = [];
let numCidx  = new Set();
let es = null;
let wasError = false;

async function loadFull() {
  try {
    const res = await fetch("/api/dashboard");
    if (!res.ok) { setTimeout(loadFull, 2000); return; }
    const d = await res.json();
    if (d.error) { setTimeout(loadFull, 2000); return; }
    buildTables(d);
    connectStream();
  } catch(e) {
    document.getElementById("status").textContent = "서버 연결 실패, 재시도 중...";
    setTimeout(loadFull, 2000);
  }
}

function buildGroups(rows, rowMeta) {
  const groups = [];
  let current = [];
  let seenIndexCode = false;

  for (let i = 0; i < rows.length; i++) {
    if (rowMeta[i].sep) continue;

    // cidx 0 = IdxCode, cidx 1 = IdxName
    const idxCode = (rows[i]["0"]?.v || "").trim();
    const idxName = (rows[i]["1"]?.v || "").trim();

    if (idxCode === "IndexCode") seenIndexCode = true;

    const isTotal      = idxCode === "합계" || idxName === "합계";
    const isTrigger    = SECTION_STARTERS.has(idxCode) &&
                         !(seenIndexCode && idxCode === "K2G01P");
    const isNewSection = isTrigger && current.length > 0;

    if (isTotal) {
      current.push(i);
      groups.push([...current]);
      current = [];
    } else if (isNewSection) {
      groups.push([...current]);
      current = [i];
    } else {
      current.push(i);
    }
  }

  if (current.length > 0) groups.push([...current]);
  return groups;
}

function buildTables(d) {
  const idxSec = d.sections.find(s => s.id === "idx");

  colOrder = idxSec.cols.map(([cidx, hdr]) => ({ cidx, hdr }));
  numCidx  = new Set(idxSec.num_cidx);

  document.getElementById("hBaseDate").textContent = d.header.base_date;
  document.getElementById("hYtd").textContent      = d.header.ytd;
  document.getElementById("hIr").textContent       = d.header.ir;
  document.getElementById("hExp1").textContent     = d.header.exp1;
  document.getElementById("hExp2").textContent     = d.header.exp2;
  document.getElementById("hUpdated").textContent  = d.updated;

  const groups = buildGroups(idxSec.rows, idxSec.row_meta);
  const thead  = "<tr>" + colOrder.map(c => `<th>${c.hdr}</th>`).join("") + "</tr>";

  const filledGroups = [];
  for (const group of groups) {
    let tbody = "";
    for (const ri of group) {
      const meta = idxSec.row_meta[ri];
      if (meta.sep) continue;
      const row = idxSec.rows[ri];
      tbody += `<tr class="${meta.total ? "total-row" : ""}">`;
      for (const { cidx } of colOrder) {
        const cell = row[String(cidx)] || { v: "", color: "" };
        tbody += makeTd(ri, cidx, cell);
      }
      tbody += "</tr>";
    }
    if (tbody) filledGroups.push(tbody);
  }

  let html = "";
  for (let gi = 0; gi < filledGroups.length; gi++) {
    const isFirstOrLast = gi === 0 || gi === filledGroups.length - 1;
    const theadHtml = isFirstOrLast ? `<thead>${thead}</thead>` : "";
    html += `<div class="table-section">
      <table>${theadHtml}<tbody>${filledGroups[gi]}</tbody></table>
    </div>`;
  }

  document.getElementById("tablesWrap").innerHTML = html;
  document.getElementById("status").style.display     = "none";
  document.getElementById("infoBar").style.display    = "flex";
  document.getElementById("tablesWrap").style.display = "flex";
}

function makeTd(ri, cidx, cell) {
  const styles = [];
  styles.push(`text-align:${numCidx.has(cidx) ? "right" : "left"}`);
  const colorCls = cell.color === "green" ? "pnl-green"
                 : cell.color === "red"   ? "pnl-red" : "";
  return `<td id="c-idx-${ri}-${cidx}" class="${colorCls}" style="${styles.join(";")}">${cell.v}</td>`;
}

function connectStream() {
  if (es) es.close();
  es = new EventSource("/api/stream");

  es.onopen = () => {
    document.getElementById("liveDot").className = "dot";
    if (wasError) {
      wasError = false;
      fetch("/api/dashboard").then(r => r.ok ? r.json() : null)
        .then(d => { if (d && !d.error) buildTables(d); }).catch(() => {});
    }
  };

  es.onmessage = (e) => {
    const d = JSON.parse(e.data);
    if (d.type === "connected") return;
    applyChanges(d.cells, d.updated);
  };

  es.onerror = () => {
    document.getElementById("liveDot").className = "dot error";
    wasError = true;
  };
}

function applyChanges(cells, updated) {
  document.getElementById("hUpdated").textContent = updated;

  for (const { key, v, color } of cells) {
    const parts = key.split("_");
    const sid  = parts[0];
    const ri   = parts[1];
    const cidx = Number(parts[2]);

    // ssfo_idx.html은 idx 섹션만 처리
    if (sid !== "idx") continue;

    const td = document.getElementById(`c-idx-${ri}-${cidx}`);
    if (!td) continue;

    td.textContent = v;
    td.classList.remove("pnl-green", "pnl-red");
    if (color === "green") td.classList.add("pnl-green");
    else if (color === "red") td.classList.add("pnl-red");

    td.classList.remove("flash");
    void td.offsetWidth;
    td.classList.add("flash");
    td.addEventListener("animationend", () => td.classList.remove("flash"), { once: true });
  }

  const dot = document.getElementById("liveDot");
  dot.classList.add("live");
  setTimeout(() => dot.classList.remove("live"), 300);
}

loadFull();
</script>
</body>
</html>
